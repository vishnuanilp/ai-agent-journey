name: Vocview CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: week7/sat_vocview_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -v
        env:
          ANTHROPIC_API_KEY: fake-key-for-ci
          OPENAI_API_KEY: fake-key-for-ci
          GEMINI_API_KEY: fake-key-for-ci